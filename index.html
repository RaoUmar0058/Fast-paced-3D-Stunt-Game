<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velocity 3D Stunt Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="ui"><h1>Velocity 3D: Use W, A, D</h1></div>
    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        const scene = new THREE.Scene();
        const world = new CANNON.World();
        world.gravity.set(0, -9.8, 0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ground: Static
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);

        // Car: Dynamic
        const carBody = new CANNON.Body({ mass: 5, shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.25, 1)) });
        carBody.position.set(0, 5, 0);
        world.addBody(carBody);

        const carMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshNormalMaterial());
        scene.add(carMesh);

        // Input
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);

            // Directly setting velocity for guaranteed movement
            if (keys['w']) carBody.velocity.z = -5;
            if (keys['a']) carBody.velocity.x = -5;
            if (keys['d']) carBody.velocity.x = 5;

            carMesh.position.copy(carBody.position);
            carMesh.quaternion.copy(carBody.quaternion);
            
            camera.position.set(carBody.position.x, carBody.position.y + 5, carBody.position.z + 10);
            camera.lookAt(carMesh.position);
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
