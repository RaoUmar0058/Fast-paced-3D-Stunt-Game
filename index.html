<!DOCTYPE html>
<html>
<head>
    <title>Velocity 3D Stunt Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; font-size: 24px; }
    </style>
</head>
<body>
    <div id="ui">Speed: <span id="speed">0</span></div>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        // 1. Scene & Physics World
        const scene = new THREE.Scene();
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Light (Taake Object dikhe)
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // 3. Physics & Visual Car
        const carBody = new CANNON.Body({ mass: 100, shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.25, 1)) });
        carBody.position.set(0, 2, 0);
        world.addBody(carBody);

        const carMesh = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.5, 2),
            new THREE.MeshStandardMaterial({ color: 0xff0000 })
        );
        scene.add(carMesh);

        // 4. Ground
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);
        
        const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        groundMesh.rotation.x = -Math.PI / 2;
        scene.add(groundMesh);

        // 5. Game Loop
        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            
            carMesh.position.copy(carBody.position);
            carMesh.quaternion.copy(carBody.quaternion);
            
            camera.position.set(carBody.position.x, carBody.position.y + 5, carBody.position.z + 10);
            camera.lookAt(carBody.position);
            
            renderer.render(scene, camera);
        }

        // 6. Controls
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w') carBody.applyForce(new CANNON.Vec3(0, 0, -1000), carBody.position);
            if(e.key === 'a') carBody.applyTorque(new CANNON.Vec3(0, 100, 0));
            if(e.key === 'd') carBody.applyTorque(new CANNON.Vec3(0, -100, 0));
        });

        animate();
    </script>
</body>
</html>
