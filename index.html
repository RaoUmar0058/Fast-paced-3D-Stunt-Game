<!DOCTYPE html>
<html>
<head>
    <title>Advanced 3D Stunt Racer</title>
    <style>body { margin: 0; overflow: hidden; } #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; }</style>
</head>
<body>
    <div id="ui"><h1>Speed: <span id="speed">0</span></h1></div>
    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        // 1. Setup World & Physics
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Car (Physics Body)
        const carShape = new CANNON.Box(new CANNON.Vec3(0.5, 0.25, 1));
        const carBody = new CANNON.Body({ mass: 100 });
        carBody.addShape(carShape);
        carBody.position.set(0, 1, 0);
        world.addBody(carBody);

        // 3. Visual Car
        const carGeo = new THREE.BoxGeometry(1, 0.5, 2);
        const carMat = new THREE.MeshNormalMaterial();
        const carMesh = new THREE.Mesh(carGeo, carMat);
        scene.add(carMesh);

        // 4. Ground
        const groundBody = new CANNON.Body({ mass: 0 });
        groundBody.addShape(new CANNON.Plane());
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);

        // 5. Game Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            
            // Sync physics to visual
            carMesh.position.copy(carBody.position);
            carMesh.quaternion.copy(carBody.quaternion);
            
            camera.position.set(carBody.position.x, carBody.position.y + 3, carBody.position.z + 7);
            camera.lookAt(carBody.position);
            
            renderer.render(scene, camera);
        }

        // 6. Controls
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w') carBody.applyForce(new CANNON.Vec3(0, 0, -500), carBody.position);
            if(e.key === 'a') carBody.applyTorque(new CANNON.Vec3(0, 50, 0));
            if(e.key === 'd') carBody.applyTorque(new CANNON.Vec3(0, -50, 0));
        });

        animate();
    </script>
</body>
</html>
