<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velocity 3D Stunt Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><h1>Speed: <span id="speed">0</span></h1></div>
    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        // 1. Initial Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // 3. Create Ground (Static)
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);
        
        const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshPhongMaterial({ color: 0x228B22 }));
        groundMesh.rotation.x = -Math.PI / 2;
        scene.add(groundMesh);

        // 4. Create Car (Dynamic)
        const carBody = new CANNON.Body({ mass: 50, shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.25, 1)) });
        carBody.position.set(0, 5, 0);
        world.addBody(carBody);

        const carMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
        scene.add(carMesh);

        // 5. Controls
        const keys = { w: false, a: false, d: false };
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 6. Game Loop
        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            
            // Movement Logic
            carBody.wakeUp();
            if (keys.w) carBody.applyLocalForce(new CANNON.Vec3(0, 0, -8000), new CANNON.Vec3(0, 0, 0));
            if (keys.a) carBody.angularVelocity.set(0, 3, 0);
            if (keys.d) carBody.angularVelocity.set(0, -3, 0);

            // Sync visual
            carMesh.position.copy(carBody.position);
            carMesh.quaternion.copy(carBody.quaternion);

            // Camera Follow
            camera.position.lerp(new THREE.Vector3(carBody.position.x, carBody.position.y + 4, carBody.position.z + 8), 0.1);
            camera.lookAt(carMesh.position);

            document.getElementById('speed').innerText = Math.floor(carBody.velocity.length());
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
