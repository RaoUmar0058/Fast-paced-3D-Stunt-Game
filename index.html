<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; overflow: hidden; background: #222; }</style>
</head>
<body>
    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // 1. Basic Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Light (Zaroori hai "Game Feel" ke liye)
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. Car ki Shape (Box ki jagah ek "Low Poly" car design)
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 2), new THREE.MeshStandardMaterial({color: 0xff0000}));
        const top = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.3, 1), new THREE.MeshStandardMaterial({color: 0xffffff}));
        top.position.y = 0.3;
        car.add(body, top);
        scene.add(car);

        // 4. Track (Game Vibe ke liye grid texture ya path)
        const track = new THREE.Mesh(new THREE.PlaneGeometry(20, 500), new THREE.MeshStandardMaterial({color: 0x333333}));
        track.rotation.x = -Math.PI / 2;
        scene.add(track);

        camera.position.set(0, 5, 10);

        // 5. Game Loop
        let speed = 0;
        window.addEventListener('keydown', (e) => { if(e.key == 'w') speed = 0.5; });
        window.addEventListener('keyup', (e) => { if(e.key == 'w') speed = 0; });

        function animate() {
            requestAnimationFrame(animate);
            car.position.z -= speed; // Forward movement
            camera.position.z -= speed;
            track.position.z -= speed; // Track move hota lagega
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
