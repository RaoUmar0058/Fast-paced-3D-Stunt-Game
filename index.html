<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velocity 3D Stunt Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Velocity 3D</h1>
        <p>Speed: <span id="speed">0</span></p>
    </div>
    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        // --- ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky color
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const amb = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- PHYSICS OBJECTS ---
        // Car
        const carBody = new CANNON.Body({ mass: 100, shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.25, 1)) });
        carBody.position.set(0, 5, 0);
        world.addBody(carBody);

        const carMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
        scene.add(carMesh);

        // Ground
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);

        const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshPhongMaterial({ color: 0x228B22 }));
        groundMesh.rotation.x = -Math.PI / 2;
        scene.add(groundMesh);

        // --- GAME LOGIC ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function update() {
            world.step(1/60);
            
            // Movement
            if (keys.w) carBody.applyForce(new CANNON.Vec3(0, 0, -1500), carBody.position);
            if (keys.a) carBody.applyTorque(new CANNON.Vec3(0, 50, 0));
            if (keys.d) carBody.applyTorque(new CANNON.Vec3(0, -50, 0));

            // Sync
            carMesh.position.copy(carBody.position);
            carMesh.quaternion.copy(carBody.quaternion);
            
            // Camera follow
            camera.position.lerp(new THREE.Vector3(carBody.position.x, carBody.position.y + 4, carBody.position.z + 8), 0.1);
            camera.lookAt(carMesh.position);
            
            document.getElementById('speed').innerText = Math.floor(carBody.velocity.length());
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
