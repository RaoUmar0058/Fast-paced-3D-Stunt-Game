<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; color: yellow; font-family: sans-serif; font-size: 30px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="hud">RACE TO SURVIVE</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // 1. Scene setup with Fog (Fog se game real lagti hai)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.Fog(0x222222, 1, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting (Atmosphere)
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        // 3. Road (Detailed)
        const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshBasicMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI/2;
        scene.add(road);

        // 4. Car (Basic Geometry)
        const car = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        car.position.y = 0.5;
        scene.add(car);

        // 5. Game Loop
        let pos = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            // Motion (Vibe)
            pos += 0.2;
            car.position.z = -pos;
            camera.position.z = -pos + 5;
            camera.position.y = 3;
            camera.lookAt(0, 0, -pos - 5);
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
